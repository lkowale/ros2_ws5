# Nav2 parameters for solbot5 — M3 one-line navigator.
#
# Uses the custom ReedsSheppPlanner (planner) instead of NavfnPlanner.
# Plans minimum-length forward+reverse arc/straight paths respecting Ackermann
# min turning radius. RPP controller follows the path (reverse segments have
# yaw flipped by π). Mapless rolling-window costmaps, no LiDAR in sim.

bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    default_nav_to_pose_bt_xml: "/home/aa/ros2_ws5/src/navigation/nav2_bringup/behavior_trees/navigate_plan_once.xml"
    always_reload_bt_xml: true
    navigators: ["navigate_to_pose", "navigate_through_poses", "run_one_line"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    run_one_line:
      plugin: "one_line_nav/OneLineNavigator"
      fields_directory: "/home/aa/ros2_ws5/src/fields"
    plugin_lib_names:
      - one_line_bt_nodes
      - drive_arc_bt_node
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

controller_server:
  ros__parameters:
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath", "SwathFollow"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.5
      yaw_goal_tolerance: 0.5

    SwathFollow:
      plugin: "tool_line_follower_controller/ToolLineFollowerController"
      gps_frame_id: gps_link
      desired_linear_vel: 0.7
      max_linear_vel: 0.7
      min_linear_vel: 0.4
      max_angular_vel: 1.0
      transform_tolerance: 0.1
      kp_near: 1.0
      kp_mid: 1.2
      kp_far: 1.6
      near_line_threshold: 0.05
      mid_line_threshold: 0.30
      ki_cross_track: 0.0
      ki_clamp: 0.1
      ki_entry_ignore_s: 5.0
      kd_cross_track: 0.3
      tool_lateral_offset: 0.0
      approach_velocity_scaling_dist: 2.0
      approach_min_velocity: 0.4

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 1.0
      lookahead_dist: 1.2
      min_lookahead_dist: 0.6
      max_lookahead_dist: 2.0
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 1.0
      transform_tolerance: 0.1
      use_velocity_scaled_lookahead_dist: true
      min_approach_linear_velocity: 0.2
      approach_velocity_scaling_dist: 2.0
      use_collision_detection: false
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 1.2
      regulated_linear_scaling_min_speed: 0.25
      # Ackermann can't turn in place — disable rotate-to-heading, allow reverse.
      allow_reversing: true
      use_rotate_to_heading: false
      max_robot_pose_search_dist: 10.0

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    # RS planner doesn't use costmap data, but planner_server still waits for a
    # fresh costmap update before calling createPlan. With only an inflation layer
    # (no sensors) the costmap updates at 1 Hz; raise the timeout so it doesn't
    # abort before the first update arrives.
    costmap_update_timeout: 5.0
    planner_plugins: ["GridBased", "StraightLine", "SwathTurn"]
    GridBased:
      plugin: "planner/ReedsSheppPlanner"
      min_turning_radius: 1.5
      interpolation_resolution: 0.05
    StraightLine:
      plugin: "nav2_straightline_planner::StraightLine"
      interpolation_resolution: 0.05
    SwathTurn:
      plugin: "planner/SwathTurnPlanner"
      min_turning_radius: 1.5
      interpolation_resolution: 0.05
      lead_in_length: 0.5

smoother_server:
  ros__parameters:
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait", "drive_arc"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    drive_arc:
      plugin: "drive_arc/DriveArcBehavior"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_footprint
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0

waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [1.5, 0.0, 2.0]
    min_velocity: [-1.5, 0.0, -2.0]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

# Mapless, sensorless costmaps — rolling window, no static/obstacle layers.
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 10
      height: 10
      resolution: 0.1
      robot_radius: 0.5
      plugins: ["inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base_footprint
      robot_radius: 0.5
      resolution: 0.1
      rolling_window: true
      width: 60
      height: 60
      track_unknown_space: false
      plugins: ["inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: True
